name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran python3 python3-matplotlib

      - name: Clean
        run: make distclean

      - name: Check tracked file sizes
        run: make check-large-files

      - name: Build and test
        run: make test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            tests/artifacts/*.csv
            tests/artifacts/*.png
          if-no-files-found: ignore
