name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran python3 python3-matplotlib

      - name: Clean
        run: make distclean

      - name: Check tracked file sizes
        run: make check-large-files

      - name: Build and test
        run: make test

      - name: Validate test artifact filenames
        if: always()
        run: |
          echo "Collected test artifacts:"
          find tests/artifacts -maxdepth 1 -type f | sort || true
          invalid_files="$(find tests/artifacts -maxdepth 1 -type f | grep '[\":<>|*?]' || true)"
          if [ -n "$invalid_files" ]; then
            echo "Error: invalid artifact filename(s) detected:" >&2
            printf '%s\n' "$invalid_files" >&2
            echo "Use filesystem-safe timestamps such as 20260317T124705." >&2
            exit 1
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts
          path: |
            tests/artifacts/*.csv
            tests/artifacts/*.png
          if-no-files-found: ignore
